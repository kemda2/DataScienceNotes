<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clipboard Görselini Markdown Base64 Koduna Çevir</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f7fa;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h2 {
    color: #333;
  }
  p {
    color: #555;
    max-width: 600px;
    text-align: center;
  }
  .container {
    background: #fff;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    max-width: 700px;
    width: 100%;
    text-align: center;
  }
  textarea {
    width: 100%;
    height: 140px;
    font-family: monospace;
    font-size: 14px;
    margin-top: 15px;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    resize: none;
  }
  img {
    max-width: 100%;
    margin-top: 20px;
    border-radius: 8px;
    border: 1px solid #ddd;
  }
  button {
    margin-top: 10px;
    padding: 10px 20px;
    background-color: #0078d7;
    color: #fff;
    border: none;
    border-radius: 5px;
    font-size: 14px;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover {
    background-color: #005ea1;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Panodaki Görseli Markdown Base64 Koduna Çevir</h2>
  <p>Bir görseli kopyalayın (Ctrl+C), buraya yapıştırın (Ctrl+V). Markdown kodu ve görsel önizleme hemen görünecektir.</p>

  <textarea id="markdownCode" placeholder="Markdown kodu buraya gelecek..." readonly></textarea>
  <br/>
  <button id="copyButton" style="display:none;">Markdown Kodunu Kopyala</button>
  <img id="preview" alt="Görsel önizleme" />
</div>

<script>
const markdownArea = document.getElementById('markdownCode');
const previewImg = document.getElementById('preview');
const copyButton = document.getElementById('copyButton');

document.addEventListener('paste', event => {
  const items = (event.clipboardData || event.originalEvent.clipboardData).items;
  for (const item of items) {
    if (item.type.indexOf('image') !== -1) {
      const file = item.getAsFile();
      const reader = new FileReader();
      reader.onload = e => {
        const base64 = e.target.result;
        const markdown = `![clipboard-image](${base64})`;
        markdownArea.value = markdown;
        previewImg.src = base64;
        copyButton.style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
      event.preventDefault();
      break;
    }
  }
});

copyButton.addEventListener('click', () => {
  markdownArea.select();
  markdownArea.setSelectionRange(0, 99999); // Mobil uyumluluk
  document.execCommand('copy');
  copyButton.textContent = "Kopyalandı!";
  setTimeout(() => copyButton.textContent = "Markdown Kodunu Kopyala", 2000);
});
</script>

</body>
</html>
